<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuggets v5</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
}

.hidden{
display:none;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.08);
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login" class="h-screen flex items-center justify-center">

<div class="card p-10 rounded-xl w-80 text-center">

<h1 class="text-3xl mb-6 font-bold">Nuggets v5</h1>

<input id="keyInput"
placeholder="Enter Access Key"
class="w-full p-3 rounded bg-black border border-white mb-4">

<button onclick="checkKey()"
class="w-full bg-white text-black p-3 rounded">

Unlock

</button>

<p id="error" class="text-red-400 mt-3"></p>

</div>

</div>

<!-- MAIN SITE -->

<div id="site" class="hidden p-10">

<h1 class="text-4xl mb-8">Nuggets v5</h1>

<div class="grid grid-cols-3 gap-6">

<div onclick="openSite('https://youtube.com')" class="card p-6 rounded cursor-pointer">
YouTube
</div>

<div onclick="openSite('https://chat.openai.com')" class="card p-6 rounded cursor-pointer">
ChatGPT
</div>

<div onclick="openSite('https://crazygames.com')" class="card p-6 rounded cursor-pointer">
Games
</div>

</div>

<button onclick="openAdmin()" id="adminBtn"
class="hidden mt-10 bg-red-500 px-6 py-3 rounded">

Admin Panel

</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" class="hidden p-10">

<h1 class="text-3xl mb-6">Admin Panel</h1>

<div class="mb-6">

<input id="newKey"
placeholder="Create new key"
class="p-3 bg-black border border-white rounded">

<button onclick="addKey()"
class="bg-green-500 px-4 py-2 rounded ml-2">

Add Key

</button>

</div>

<h2 class="text-xl mb-3">Active Keys</h2>

<div id="keyList"></div>

<br>

<button onclick="closeAdmin()" class="bg-white text-black px-6 py-3 rounded">
Back
</button>

</div>

<script>

/* ADMIN KEY */

const ADMIN_KEY = "NUGGETS-ADMIN";

/* DEFAULT KEYS */

let keys = JSON.parse(localStorage.getItem("keys")) || [
"PLAY-123",
"FUN-456"
];

/* LOGIN */

function checkKey(){

let key = document.getElementById("keyInput").value;

if(key === ADMIN_KEY){

localStorage.setItem("admin","true");
unlock(true);

return;

}

if(keys.includes(key)){

unlock(false);

}

else{

document.getElementById("error").innerText="Invalid key";

}

}

function unlock(admin){

document.getElementById("login").style.display="none";
document.getElementById("site").style.display="block";

if(admin){

document.getElementById("adminBtn").classList.remove("hidden");

}

}

/* ADMIN */

function openAdmin(){

document.getElementById("site").style.display="none";
document.getElementById("adminPanel").style.display="block";

renderKeys();

}

function closeAdmin(){

document.getElementById("adminPanel").style.display="none";
document.getElementById("site").style.display="block";

}

function addKey(){

let newKey=document.getElementById("newKey").value;

if(newKey.length<3)return;

keys.push(newKey);

localStorage.setItem("keys",JSON.stringify(keys));

renderKeys();

}

function deleteKey(i){

keys.splice(i,1);

localStorage.setItem("keys",JSON.stringify(keys));

renderKeys();

}

function renderKeys(){

let list=document.getElementById("keyList");

list.innerHTML="";

keys.forEach((k,i)=>{

let div=document.createElement("div");

div.innerHTML=`

<div class="card p-3 rounded flex justify-between mb-2">

${k}

<button onclick="deleteKey(${i})" class="text-red-400">
Delete
</button>

</div>

`;

list.appendChild(div);

});

}

/* SITES */

function openSite(url){

window.open(url,"_blank");

}

</script>

</body>
</html>
