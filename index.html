<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nova Portal</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<!-- KEY SCREEN -->

<div id="lockScreen" class="h-screen flex items-center justify-center">

<div class="bg-white/10 p-10 rounded-xl text-center">

<h1 class="text-4xl mb-6">Access Required</h1>

<input id="keyInput" placeholder="Enter Access Key"
class="bg-black border border-white p-3 rounded w-full mb-4">

<button onclick="checkKey()"
class="bg-white text-black px-6 py-3 rounded w-full">

Unlock

</button>

<p id="error" class="text-red-400 mt-3"></p>

</div>

</div>


<!-- MAIN SITE -->

<div id="site" class="hidden p-10">

<h1 class="text-5xl mb-6">My Portal</h1>

<div class="grid grid-cols-3 gap-6">

<button onclick="openSite('https://youtube.com')"
class="bg-white/10 p-6 rounded-lg hover:bg-white/20">

YouTube

</button>

<button onclick="openSite('https://chat.openai.com')"
class="bg-white/10 p-6 rounded-lg hover:bg-white/20">

ChatGPT

</button>

<button onclick="openSite('https://crazygames.com')"
class="bg-white/10 p-6 rounded-lg hover:bg-white/20">

Games

</button>

</div>

</div>


<script>

const ACCESS_KEY = "STARLINK-2026";

function checkKey(){

let key = document.getElementById("keyInput").value;

if(key === ACCESS_KEY){

localStorage.setItem("portal_access","true");

unlock();

}

else{

document.getElementById("error").innerText = "Invalid Key";

}

}

function unlock(){

document.getElementById("lockScreen").style.display="none";

document.getElementById("site").style.display="block";

}

if(localStorage.getItem("portal_access") === "true"){

unlock();

}

function openSite(url){

window.open(url,"_blank");

}

</script>

</body>
</html>
